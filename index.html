<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夢の地図</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="body">

    <!-- ===== Home ===== -->
    <section id="sec-home" class="section">
      <h1>夢の地図</h1>

      <!-- AI チャット -->
      <div id="chat"></div>
      <div id="choices"></div>
    </section>

    <!-- ===== Tasks ===== -->
    <section id="sec-tasks" class="section" style="display:none">
      <h2>タスク</h2>
      <div id="tasks-list"></div>
    </section>

    <!-- ===== Map ===== -->
    <section id="sec-map" class="section" style="display:none">
      <h2>マップ</h2>
      <p>（今後ここに夢のマップを表示）</p>
    </section>

    <!-- ===== Shop ===== -->
    <section id="sec-shop" class="section" style="display:none">
      <h2>買い物</h2>
      <div id="shop-list"></div>
    </section>

    <!-- ===== History ===== -->
    <section id="sec-cal" class="section" style="display:none">
      <h2>履歴</h2>
      <div id="history-list"></div>
    </section>

  </div>

  <!-- ===== Bottom Navigation ===== -->
  <nav class="bnav">
    <button class="nb" data-s="home">🏠<span>ホーム</span></button>
    <button class="nb" data-s="tasks">📋<span>タスク</span></button>
    <button class="nb" data-s="map">🌐<span>マップ</span></button>
    <button class="nb" data-s="shop">🛒<span>買い物</span></button>
    <button class="nb" data-s="cal">📅<span>履歴</span></button>
  </nav>

  <!-- JS -->
  <script src="main.js"></script>

  <!-- ===== 画面切り替え ===== -->
  <script>
    const buttons = document.querySelectorAll(".nb");
    const sections = document.querySelectorAll(".section");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const target = btn.dataset.s;

        sections.forEach(sec => {
          sec.style.display = sec.id === "sec-" + target ? "block" : "none";
        });
      });
    });
  </script>

</body>
</html>
