<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamSketch AI Console Test</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
      padding: 8px;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      font-size: 16px;
    }
    pre {
      margin-top: 16px;
      background: #222;
      padding: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h2>AI 動作確認（Workers console.log）</h2>

  <textarea id="input" placeholder="ここに何か書いてください"></textarea>
  <button id="send">AIへ送信</button>

  <pre id="output">結果がここに表示されます</pre>

  <script src="main.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
