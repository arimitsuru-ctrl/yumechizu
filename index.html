<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamSketch AI Console Test</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 16px;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    pre {
      margin-top: 16px;
      background: #222;
      padding: 12px;
      white-space: pre-wrap;
      min-height: 80px;
    }
  </style>
</head>

<body>
  <h2>AI 動作確認（Workers console.log）</h2>

  <textarea id="input" placeholder="ここに何か書いてください"></textarea>
  <button id="send">AIへ送信</button>

  <pre id="output">結果がここに表示されます</pre>

  <!-- JS（キャッシュ対策付き） -->
  <script src="main.js?v=1"></script>

  <script>
    // Service Worker（安全版）
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("sw.js");
          console.log("SW registered:", reg);
        } catch (e) {
          console.log("SW registration failed:", e);
        }
      });
    }
  </script>
</body>
</html>
