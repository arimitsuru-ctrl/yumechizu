<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夢の地図</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:#fafafa;
    }

    /* アプリ本体 */
    .body{
      padding:16px;
      padding-bottom:80px; /* フッター分 */
    }

    /* セクション（表示制御は JS が担当） */
    .section{
      padding:8px 0;
    }

    h1,h2{
      margin:0 0 12px 0;
    }

    /* フッターナビ */
    .bnav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:64px;
      display:flex;
      background:#ffffff;
      border-top:1px solid #ddd;
      z-index:1000;
    }

    .nb{
      flex:1;
      border:none;
      background:none;
      font-size:13px;
      padding:6px 0;
      color:#555;
    }

    .nb.active{
      color:#0284c7;
      font-weight:bold;
    }

    /* AI 表示 */
    #chat div{
      background:#fff;
      padding:12px;
      border-radius:8px;
      margin-bottom:8px;
      box-shadow:0 1px 3px rgba(0,0,0,.08);
    }

    #choices button{
      margin:4px 4px 0 0;
      padding:6px 10px;
      border-radius:6px;
      border:1px solid #ccc;
      background:#f5f5f5;
    }
  </style>
</head>

<body>

  <!-- アプリ本体 -->
  <div class="body">

    <section id="sec-home" class="section">
      <h1>夢の地図</h1>
      <div id="chat"></div>
      <div id="choices"></div>
    </section>

    <section id="sec-tasks" class="section" style="display:none">
      <h2>タスク</h2>
      <p>ここにタスク一覧が入ります</p>
    </section>

    <section id="sec-map" class="section" style="display:none">
      <h2>マップ</h2>
      <p>ここにマインドマップが入ります</p>
    </section>

    <section id="sec-shop" class="section" style="display:none">
      <h2>買い物</h2>
      <p>買い物リスト</p>
    </section>

    <section id="sec-cal" class="section" style="display:none">
      <h2>履歴</h2>
      <p>過去の記録</p>
    </section>

  </div>

  <!-- フッター -->
  <nav class="bnav">
    <button class="nb" data-s="home">🏠<br>ホーム</button>
    <button class="nb" data-s="tasks">📋<br>タスク</button>
    <button class="nb" data-s="map">🌐<br>マップ</button>
    <button class="nb" data-s="shop">🛒<br>買い物</button>
    <button class="nb" data-s="cal">📅<br>履歴</button>
  </nav>

  <!-- JS（必ず一番下） -->
  <script src="main.js"></script>
</body>
</html>
