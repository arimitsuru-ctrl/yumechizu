<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#06B6D4"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="夢の地図"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>夢の地図</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2306B6D4'/%3E%3Cstop offset='50%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%23EF476F'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23bg)'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle'%3E🗺️%3C/text%3E%3C/svg%3E"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--sky:#06B6D4;--leaf:#06D6A0;--rose:#EF476F;--ink:#1a1a2e;--gold:#f59e0b;--purple:#8b5cf6;--r:16px;--sh:0 4px 20px rgba(6,182,212,0.12);--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Zen Maru Gothic','Noto Sans JP','Noto Sans',sans-serif;background:linear-gradient(135deg,#e0f7fa,#fdf6ec 60%,#fce4ec);color:var(--ink);}
#app{display:flex;flex-direction:column;height:100dvh;min-height:0;position:relative;}
/* 120%ズーム・APK WebView対応: フォールバック */
@supports not (height: 100dvh){#app{height:100vh;}}

/* ─ Header ─ */
.hdr{background:linear-gradient(90deg,#06B6D4,#06D6A0 55%,#FFD166);padding:calc(var(--st)+8px) 10px 8px;display:flex;align-items:center;gap:6px;box-shadow:0 2px 16px rgba(6,182,212,0.25);flex-shrink:0;z-index:50;}
.hdr-logo{font-size:17px;font-weight:700;color:white;letter-spacing:1px;flex:1;margin-left:10px;}
.hdr-btn{background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.5);color:white;border-radius:18px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700;}
.hdr-spc{width:36px;flex-shrink:0;}

/* ─ Body / Nav ─ */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:0;min-height:0;}
/* ボトムナビ: flex子要素として配置（fixed不使用） */
.bnav{display:flex;background:white;border-top:1.5px solid #e0f2fe;padding-bottom:var(--sb);flex-shrink:0;box-shadow:0 -2px 12px rgba(6,182,212,0.08);z-index:100;position:relative;pointer-events:auto;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 4px;gap:2px;background:none;border:none;cursor:pointer;font-family:inherit;color:#94a3b8;font-size:9px;font-weight:600;-webkit-tap-highlight-color:rgba(6,182,212,0.15);touch-action:manipulation;}
.nb .ico{font-size:19px;} .nb.active{color:#06B6D4;}

/* ─ Sections ─ */
.sec{padding:13px;display:none;} .sec.active{display:block;}
.sec-t{font-size:16px;font-weight:700;color:#0e7490;margin-bottom:11px;display:flex;align-items:center;gap:7px;}

/* ─ Cards / Inputs / Buttons ─ */
.card{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:12px;border:1.5px solid #e0f2fe;margin-bottom:11px;}
.ct{font-size:12px;font-weight:700;color:#0e7490;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:5px;}
.inp{width:100%;border:1.5px solid #bae6fd;border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--ink);background:#f8fdff;outline:none;transition:border .2s;-webkit-appearance:none;}
.inp:focus{border-color:var(--sky);}
.btn{border:none;border-radius:10px;padding:10px 13px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.bp{background:linear-gradient(90deg,#06B6D4,#06D6A0);color:white;} .bp:active{opacity:.82;transform:scale(.97);}
.bg{background:#f1f5f9;color:#64748b;} .bd{background:#fee2e2;color:#ef4444;}
.bpu{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;}
.bs{padding:6px 10px;font-size:11px;border-radius:8px;} .bw{width:100%;}
.bic{background:none;border:1.5px solid #bae6fd;border-radius:7px;padding:3px 6px;cursor:pointer;font-size:13px;font-family:inherit;}

/* ─ Mic ─ */
.mic{background:linear-gradient(135deg,#EF476F,#f59e0b);color:white;border:none;border-radius:50%;width:41px;height:41px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(239,71,111,0.3);flex-shrink:0;}
.mic.on{animation:pmic .7s infinite,micring 1.2s infinite;}
@keyframes pmic{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes micring{0%{box-shadow:0 0 0 0 rgba(239,71,111,0.5)}70%{box-shadow:0 0 0 12px rgba(239,71,111,0)}100%{box-shadow:0 0 0 0 rgba(239,71,111,0)}}
.vh{font-size:10px;color:var(--rose);font-weight:600;margin-top:3px;min-height:14px;}

/* ─ Pills / Task items ─ */
.pill{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;font-family:inherit;transition:border-color .2s;}
.ti{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:11px;margin-bottom:5px;border:1.5px solid transparent;background:#f8fdff;cursor:pointer;}
.ti.di{opacity:.5;} .ti:active{background:#e0f7fa;}
.chk{width:20px;height:20px;border-radius:50%;border:2px solid transparent;background:transparent;display:none;font-size:0;flex-shrink:0;cursor:pointer;transition:all .2s;}
.chk.dn{display:none;}
.tl{flex:1;font-size:13px;} .tl.dn{text-decoration:line-through;color:#9ca3af;}
.tbg{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700;flex-shrink:0;}
.ch{margin-left:18px;border-left:2px dashed #bae6fd;padding-left:6px;}
.pb{height:5px;background:#e0f2fe;border-radius:3px;overflow:hidden;margin-top:4px;}
.pf{height:100%;background:linear-gradient(90deg,#06B6D4,#06D6A0);border-radius:3px;transition:width .5s;}

/* ─ Shopping ─ */
.si{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f9ff;} .si:last-child{border-bottom:none;}
.sd{text-decoration:line-through;color:#9ca3af;}
.sl{text-decoration:none;font-size:12px;padding:3px 7px;border-radius:7px;border:1.5px solid #bae6fd;color:#06B6D4;background:#f0f9ff;flex-shrink:0;}
.sugg-l{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.sg{background:#e0f7fa;border:1.5px solid #bae6fd;border-radius:18px;padding:4px 9px;font-size:11px;cursor:pointer;color:#0e7490;font-family:inherit;font-weight:600;}
.sg:active{background:var(--sky);color:white;}

/* ─ Calendar ─ */
.cal-hdr{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.cal-ml{flex:1;text-align:center;font-weight:700;font-size:15px;color:#0e7490;}
.cal-nv{background:#e0f7fa;border:none;border-radius:7px;width:30px;height:30px;font-size:14px;cursor:pointer;}
.cal-wd-r{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-wd{text-align:center;font-size:10px;font-weight:700;color:#64748b;padding:2px 0;}
.cal-gr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-c{border-radius:8px;padding:4px 3px;min-height:54px;background:#f8fdff;border:1px solid #e0f2fe;font-size:10px;}
.cal-c.td{border-color:var(--sky);background:#e0f7fa;} .cal-c.ot{opacity:.35;}
.cal-n{font-weight:700;color:#0e7490;margin-bottom:2px;font-size:10px;}
.cal-d{border-radius:3px;padding:1px 3px;font-size:8px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:white;cursor:pointer;}

/* ─ Home dashboard ─ */
.home-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;padding-top:18px;}
.home-cat-card{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:11px;border:1.5px solid #e0f2fe;cursor:pointer;transition:all .2s;}
.home-cat-card:active{transform:scale(.97);}
.dream-sketch-card{background:linear-gradient(135deg,#fff7ed,#fce7f3 35%,#ede9fe 65%,#e0f2fe);border:2px solid #c4b5fd;box-shadow:0 6px 28px rgba(139,92,246,0.18);grid-column:1/-1;overflow:visible;margin-top:18px;position:relative;text-align:center;}
.dream-sketch-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(251,191,36,0.25),transparent 70%);border-radius:50%;}
.dream-sketch-badge{position:absolute;top:-10px;right:10px;background:linear-gradient(90deg,#EF476F,#f59e0b);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;}

/* ─ Float panels ─ */
.fov{position:fixed;inset:0;z-index:140;background:rgba(0,0,0,0.25);display:none;pointer-events:none;} .fov.open{display:block;pointer-events:auto;}
.fpanel{position:fixed;left:0;right:0;bottom:0;z-index:150;background:white;border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,0.15);max-height:60vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:var(--sb);pointer-events:none;}
.fpanel.open{transform:translateY(0);pointer-events:auto;}
.fhandle{width:40px;height:4px;background:#e0f2fe;border-radius:2px;margin:10px auto 12px;}
.fhdr{padding:0 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f9ff;margin-bottom:8px;}
.fbody{padding:0 14px 14px;}
.fti{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;margin-bottom:5px;background:#f8fdff;cursor:pointer;}
.fti:active{background:#e0f7fa;}

/* ─ Mindmap ─ */
.mm-proj-card{background:white;border-radius:14px;box-shadow:var(--sh);padding:13px;border:1.5px solid #e0f2fe;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.mm-proj-icon{font-size:26px;flex-shrink:0;}
.mm-proj-info{flex:1;min-width:0;}
.mm-proj-title{font-size:13px;font-weight:700;color:#0e7490;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mm-proj-sub{font-size:10px;color:#64748b;margin-top:2px;}
/* 並び替えハンドル */
.mm-drag-handle{font-size:18px;color:#94a3b8;cursor:grab;flex-shrink:0;padding:4px;touch-action:none;}
.mm-drag-handle:active{cursor:grabbing;}
.mm-proj-card.drag-over{border:2px dashed #06B6D4;background:#e0f7fa;}
/* 達成フォルダ */
.mm-archive-section{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1.5px solid #6ee7b7;border-radius:14px;padding:13px;margin-bottom:10px;}
.mm-archive-title{font-size:13px;font-weight:700;color:#065f46;display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:0;}
.mm-archive-list{margin-top:10px;}
.mm-archive-item{display:flex;align-items:center;gap:10px;padding:9px 10px;background:white;border-radius:10px;margin-bottom:6px;border:1px solid #a7f3d0;}
/* マインドマップ フローティングキャンバス */
#mm-float-panel{display:none !important;}
#mm-float-panel.open{display:flex !important;}

/* ─ AI (Dream Sketch) ─ */
.dream-chat{display:flex;flex-direction:column;gap:10px;padding:10px 0;}
.dream-bubble{max-width:85%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.6;}
.dream-bubble.ai{background:linear-gradient(135deg,#e0f7fa,#f0f9ff);color:#0e7490;align-self:flex-start;border:1.5px solid #bae6fd;}
.dream-bubble.user{background:linear-gradient(135deg,#8b5cf6,#06B6D4);color:white;align-self:flex-end;}
.dream-typing{display:flex;gap:4px;padding:8px 12px;background:#f0f9ff;border-radius:16px;width:fit-content;}
.dream-dot{width:6px;height:6px;border-radius:50%;background:#06B6D4;animation:dt .8s infinite;}
.dream-dot:nth-child(2){animation-delay:.15s;} .dream-dot:nth-child(3){animation-delay:.3s;}
@keyframes dt{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}
.dream-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
.dream-choice{background:white;border:1.5px solid #bae6fd;border-radius:10px;padding:9px 10px;cursor:pointer;font-size:12px;font-family:inherit;color:#0e7490;font-weight:600;text-align:left;}
.dream-register-btn{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;border-radius:12px;padding:12px;width:100%;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;}

/* ─ Modal ─ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);pointer-events:auto;}
.mo{background:white;border-radius:20px 20px 0 0;padding:17px 17px calc(17px + var(--sb));width:100%;max-height:92vh;overflow-y:auto;}
.mot{font-size:15px;font-weight:700;color:#0e7490;margin-bottom:11px;}
.mos{font-size:11px;color:#64748b;margin-bottom:7px;}

/* ─ Cat manager ─ */
.cmi{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:9px;background:#f8fdff;border:1.5px solid #e0f2fe;margin-bottom:5px;}
.eg{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.eo{font-size:18px;cursor:pointer;padding:3px;border-radius:6px;border:2px solid transparent;}
.eo.s{background:#e0f7fa;border-color:#06B6D4;}
.cg{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.co{width:20px;height:20px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.co.s{border-color:#1a1a2e;transform:scale(1.2);}
.lbs{font-size:11px;color:#64748b;margin-top:5px;margin-bottom:2px;}
.fb{font-size:10px;color:#94a3b8;background:#f0f9ff;padding:2px 6px;border-radius:6px;}
.eb{background:#f0f9ff;border-radius:10px;padding:10px;margin-bottom:6px;margin-left:6px;border:1.5px solid #bae6fd;}
.ab{background:#f8fdff;border-radius:12px;padding:12px;border:1.5px dashed #bae6fd;margin-bottom:12px;}

/* ─ Help / Lang / Transfer ─ */
.help-card{background:white;border-radius:13px;padding:12px;margin-bottom:8px;border:1.5px solid #e0f2fe;box-shadow:var(--sh);}
.help-q{font-weight:700;color:#0e7490;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.help-a{font-size:12px;color:#334155;line-height:1.7;margin-top:7px;display:none;white-space:pre-wrap;}
.help-a.open{display:block;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.lang-btn{padding:8px;border-radius:9px;border:1.5px solid #e0f2fe;background:#f8fdff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;text-align:center;}
.lang-btn.active{background:#e0f7fa;border-color:#06B6D4;color:#0e7490;}
.xfer-section{background:#f8fdff;border:1.5px dashed #bae6fd;border-radius:11px;padding:13px;margin-bottom:11px;}

/* ─ Misc ─ */
.row{display:flex;gap:6px;align-items:center;} .mt8{margin-top:8px;} .lbl{font-size:11px;color:#64748b;margin:5px 0 2px;}
.emp{text-align:center;padding:24px 14px;color:#9ca3af;} .emp-e{font-size:36px;margin-bottom:7px;}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <span id="hdr-date" style="font-size:12px;font-weight:700;color:#0e7490;letter-spacing:0.5px"></span>
    <span id="hdr-status" style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#d1fae5;color:#065f46;margin-left:6px">ONLINE</span>
    <div style="margin-left:auto;display:flex;align-items:center;padding-right:4px">
    <button class="hdr-btn" onclick="openCatManager()">⚙️</button>
    <button class="hdr-btn" onclick="switchSec('lang')">🌐</button>
    <button class="hdr-btn" onclick="switchSec('transfer')">📤</button>
    <button class="hdr-btn" onclick="switchSec('help')">❓</button>
    </div>
  </header>

  <div class="body">
    <!-- HOME -->
    <div class="sec active" id="sec-home">
      <div class="sec-t" style="font-size:180%;align-items:center"><img src="icon-192.png" style="width:1em;height:1em;border-radius:22%;vertical-align:middle;margin-right:6px"><span id="t-home">夢の地図</span></div>
      <div id="home-cnt"></div>
    </div>

    <!-- TASKS -->
    <div class="sec" id="sec-tasks">
      <div class="sec-t"><span>📋</span><span id="t-tasks">タスク</span></div>
      <div class="card">
        <div class="ct">✨ <span id="t-newtask">新しいタスク</span></div>
        <div class="row"><input class="inp" id="new-task-inp" style="flex:1"/><button class="mic" id="mic-task">🎤</button></div>
        <div class="vh" id="vh-task"></div>
        <div id="cat-new-row" class="mt8" style="display:flex;flex-wrap:wrap;gap:4px"></div>
        <button class="btn bp bw mt8" id="add-task-btn">＋ <span id="t-addtask">タスク追加</span></button>
      </div>
      <div class="card" style="padding:8px 11px"><div id="filter-row" style="display:flex;flex-wrap:wrap;gap:4px"></div></div>
      <div class="card">
        <div style="font-size:13px;font-weight:700;color:#0e7490;margin-bottom:10px;display:flex;align-items:center;gap:6px;">📋 <span id="t-task-list-label">タスク一覧</span></div>
        <div id="task-list"></div>
      </div>
    </div>

    <!-- MAP (プロジェクト一覧) -->
    <div class="sec" id="sec-map">
      <div class="sec-t"><span>🌐</span><span id="t-map">マインドマップ</span></div>
      <div id="mm-list-area"></div>
    </div>

    <!-- SHOPPING -->
    <div class="sec" id="sec-shop">
      <div class="sec-t"><span>🛒</span><span id="t-shop">お買い物</span></div>
      <div id="shop-cnt"></div>
    </div>

    <!-- CALENDAR -->
    <div class="sec" id="sec-cal">
      <div class="sec-t"><span>📅</span><span id="t-cal">カレンダー</span></div>
      <div class="card">
        <div class="cal-hdr"><button class="cal-nv" id="cal-prev">◀</button><div class="cal-ml" id="cal-lbl"></div><button class="cal-nv" id="cal-next">▶</button></div>
        <div class="cal-wd-r"><div class="cal-wd" style="color:#ef4444" id="wd0">日</div><div class="cal-wd" id="wd1">月</div><div class="cal-wd" id="wd2">火</div><div class="cal-wd" id="wd3">水</div><div class="cal-wd" id="wd4">木</div><div class="cal-wd" id="wd5">金</div><div class="cal-wd" style="color:#3b82f6" id="wd6">土</div></div>
        <div class="cal-gr" id="cal-grid"></div>
      </div>
    </div>

    <!-- HELP -->
    <div class="sec" id="sec-help"><div class="sec-t"><span>❓</span><span id="t-help">ヘルプ</span></div><div id="help-content"></div></div>

    <!-- TRANSFER -->
    <div class="sec" id="sec-transfer">
      <div class="sec-t"><span>📤</span><span id="t-transfer">データ転送</span></div>
      <div class="xfer-section"><div class="ct" id="t-export-title">📥 エクスポート</div><p style="font-size:12px;color:#64748b;margin-bottom:9px" id="t-export-desc">データをファイルに保存してデバイス間で共有できます。</p><button class="btn bp bw" onclick="doExport()" id="t-export-btn">📁 ファイルとして保存</button></div>

// ============================================================

function addTask(title,parentId,cat,extra={}){
  const t={id:uid(),title,parentId:parentId??null,category:cat,done:false,children:[],shopping:[],createdAt:new Date().toISOString(),doneAt:null,dueDate:extra.dueDate||null,repeat:extra.repeat||'none'};
  D.tasks.push(t);
  if(parentId!=null){const p=tmap()[parentId];if(p)p.children=[...(p.children||[]),t.id];}
  save();return t;
}
function nextDue(d,r){
  if(!d||r==='none')return d;
  const dt=new Date(d);
  ({daily:()=>dt.setDate(dt.getDate()+1),weekly:()=>dt.setDate(dt.getDate()+7),monthly:()=>dt.setMonth(dt.getMonth()+1),yearly:()=>dt.setFullYear(dt.getFullYear()+1)}[r]||(() => {}))();
  return dt.toISOString().slice(0,10);
}
function toggleDoneRepeat(id){
  const t=tmap()[id];if(!t)return;
  t.done=!t.done;t.doneAt=t.done?new Date().toISOString():null;
  if(t.done&&t.repeat!=='none'&&t.dueDate)addTask(t.title,t.parentId,t.category,{dueDate:nextDue(t.dueDate,t.repeat),repeat:t.repeat});
  save();if(document.getElementById('task-float-panel')?.classList.contains('open')){renderTaskFloat();renderTaskList();}else{render();}
}
function deleteTask(id){
  const col=id=>{const t=tmap()[id];return t?[id,...(t.children||[]).flatMap(col)]:[id];};
  const del=new Set(col(id));
  D.tasks=D.tasks.filter(t=>!del.has(t.id)).map(t=>({...t,children:(t.children||[]).filter(c=>!del.has(c))}));
  if(del.has(selId))selId=null;
  save();if(document.getElementById('task-float-panel')?.classList.contains('open')){renderTaskFloat();renderTaskList();}else{render();}
}
function addShop(taskId,item){
  if(!item.trim())return;
  const t=tmap()[taskId];if(!t)return;
  t.shopping=[...(t.shopping||[]),{id:uid(),item,done:false}];
  D.pastIngredients=[item,...D.pastIngredients.filter(x=>x!==item)].slice(0,30);
  save();
}
function toggleShop(taskId,shopId){const t=tmap()[taskId];if(!t)return;const s=t.shopping.find(x=>x.id===shopId);if(s)s.done=!s.done;save();render();}
function delShop(taskId,shopId){const t=tmap()[taskId];if(!t)return;t.shopping=t.shopping.filter(x=>x.id!==shopId);save();render();}

function doExport(){
  const json=JSON.stringify(D,null,2),name=`yume-${TODAY().replace(/-/g,'')}.yume`;
  try{
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([json],{type:'application/json'})),download:name,style:'display:none'});
    document.body.appendChild(a);setTimeout(()=>{a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href)},200)},100);
    const btn=document.getElementById('t-export-btn');if(btn){const o=btn.textContent;btn.textContent='✅ 保存しました';setTimeout(()=>btn.textContent=o,2500);}
  }catch{
    navigator.clipboard?.writeText(json).then(()=>alert('クリップボードにコピーしました。'));
  }
}
function doImport(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.tasks)throw 0;
      if(!confirm(L().importOk+'に上書きしますか？'))return;
      Object.assign(D,p);if(!D.mapOrder)D.mapOrder=[];if(!D.archived)D.archived=[];
      curLang=D.lang||'ja';syncCatLabels();save();
      document.getElementById('import-msg').textContent=L().importOk;
      applyLang(curLang);
    }catch{document.getElementById('import-msg').textContent=L().importErr;}
    input.value='';
  };
  r.readAsText(f);
}

const getMicBtn=t=>document.getElementById('mic-'+t);
const getVh=t=>document.getElementById('vh-'+t);
const getInp=t=>({task:document.getElementById('new-task-inp'),shop:document.getElementById('shop-inp'),child:document.getElementById('child-inp')}[t]);
function micOff(t){getMicBtn(t)?.classList.remove('on');const h=getVh(t);if(h)h.textContent='';}
function startVoice(target){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Chrome/Edgeが必要です');return;}
  if(recognition){recognition.stop();recognition=null;micOff(micTarget);if(micTarget===target)return;}
  micTarget=target;
  const rec=new SR();rec.lang=L().speechLang||'ja-JP';rec.interimResults=false;
  rec.onstart=()=>getMicBtn(target)?.classList.add('on');
  rec.onresult=e=>{const t=e.results[0][0].transcript;const inp=getInp(target);if(inp)inp.value=t;micOff(target);};
  rec.onend=()=>{recognition=null;micOff(target);};
  rec.onerror=()=>{recognition=null;micOff(target);};
  try{rec.start();recognition=rec;}catch{micOff(target);}
}

function switchSec(s,push=true){
  // タスク詳細が開いていたら閉じる
  const tf=document.getElementById('task-float-panel');
  if(tf?.classList.contains('open'))closeTaskFloat();
  curSec=s;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.s===s));
  document.querySelectorAll('.sec').forEach(sec=>sec.classList.toggle('active',sec.id==='sec-'+s));
  if(push){try{history.pushState({sec:s,sid:selId},'',location.href.split('#')[0]+'#'+s);}catch(e){}}
  render();
}
window.addEventListener('popstate',e=>{
  const close=(id,fn)=>{const el=document.getElementById(id);if(el?.classList.contains('open')){fn();history.pushState(null,'',location.href);return true;}return false;};
  if(close('mm-float-panel',closeMmFloat))return;
  if(close('task-float-panel',closeTaskFloat))return;
  if(document.getElementById('overlay')?.style.display!=='none'){hideModal();history.pushState(null,'',location.href);return;}
  if(close('float-panel',closeFloat))return;
  if(selId&&curSec==='home'){selId=null;render();history.pushState(null,'',location.href);return;}
  if(curSec!=='home'){switchSec('home',false);}
});

// ============================================================
// /insight エンドポイント: テキストを渡してタスク自動生成
// ============================================================
async function callInsight(text){
  try{
    const res=await fetch(WORKER_INSIGHT_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));return{error:e.error||res.status};}
    return await res.json();
  }catch(e){
    return{error:'ネットワークエラー: '+e.message};
  }
}

async function callAI(messages){
  const l=L();
  const demoC={ja:['音楽・アート','スキルアップ','旅行・冒険','健康'],en:['Music','Skills','Travel','Health'],zh:['音乐','技能','旅行','健康'],ko:['음악','스킬','여행','건강'],es:['Música','Habilidades','Viaje','Salud'],pt:['Música','Habilidades','Viagem','Saúde'],de:['Musik','Fähigkeiten','Reisen','Gesundheit'],ar:['الموسيقى','المهارات','السفر','الصحة'],ru:['Музыка','Навыки','Путешествия','Здоровье'],tl:['Musika','Kasanayan','Paglalakbay','Kalusugan'],hi:['संगीत','कौशल','यात्रा','स्वास्थ्य'],id:['Musik','Keahlian','Perjalanan','Kesehatan'],ur:['موسیقی','مہارت','سفر','صحت']};
  const choices=demoC[l.code]||demoC.en;
  const langNames={ja:'Japanese',en:'English',zh:'Chinese',ko:'Korean',es:'Spanish',pt:'Portuguese',de:'German',ar:'Arabic',ru:'Russian',tl:'Filipino',hi:'Hindi',id:'Indonesian',ur:'Urdu'};

  const sys=`You are a Dream Sketch AI. Help users turn dreams into projects.
CRITICAL: You MUST respond ONLY in ${langNames[l.code]||'English'}. NEVER mix in Chinese, Korean, or any other language. If language is Japanese, use only standard Japanese kanji (JIS level 1-2). Every single word must be in ${langNames[l.code]||'English'}.
Rules: EXACTLY 3 rounds of questions before proposing project. Round1: ask broad interests. Round2: narrow down. Round3: ask more details. Then propose project(name,3-5 tasks,shopping list).
Show 4 short choices.
ALWAYS reply JSON only. No extra text outside JSON.
Label each choice with A. B. C. D. prefix. User can combine choices like 'A and B'.
{"message":"...","choices":["A. option1","B. option2","C. option3","D. option4"],"project":null}
When proposing project: {"message":"...","choices":[],"project":{"name":"...","tasks":["t1","t2","t3"],"shopping":["s1"]}}`;

  // Worker(/api/chat)が期待するフォーマット:
  //   { system: "...", messages: [{role, content}, ...] }
  // レスポンス: { data: { reply: "..." } }
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),15000);// 15秒タイムアウト
    const res=await fetch(WORKER_CHAT_URL,{signal:controller.signal,
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:[{role:'system',content:sys},...messages.map(m=>({
          role:m.role==='assistant'?'assistant':'user',
          content:typeof m.content==='string'?m.content:JSON.stringify(m.content)
        }))]
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:'Unknown error'}));
      return{message:'❌ Worker error: '+(err.error||res.status),choices,project:null};
    }

    clearTimeout(timeout);
    const data=await res.json();

    if(data.error){
      return{message:'❌ AI error: '+(data.error||'Unknown'),choices,project:null};
    }

    // Worker レスポンス形式: { data: { reply: "..." } }
    const raw=typeof data?.response==='string'?data.response:(data?.response?.response??JSON.stringify(data?.response??''));const txt=raw.replace(/```[a-z]*\n?[\s\S]*?```/g,'').trim();
    if(!txt) return{message:'（応答なし）',choices,project:null};

    try{return JSON.parse(txt);}
    catch{
      // 壊れたJSONを修復して再試行
      try{
        const fixed=txt
          .replace(/,\s*}/g,'}')
          .replace(/,\s*]/g,']')
          .replace(/([^\\])"([^"]*?)(?=[},\]])/g,'$1"$2"')
          .replace(/}}{1,}/g,'}')
          .replace(/]{1,}}{1,}/g,']}');
        return JSON.parse(fixed);
      }catch{return{message:txt,choices,project:null};}
    }

  }catch(e){
    return{
      message:(l.code==='ja'
        ?'⚠️ AI接続エラー。\nWorkerのURLとネットワークを確認してください。\nデモ：'
        :'⚠️ Cannot reach Worker. Check URL & network.\nDemo: '
      )+choices.join('・'),
      choices,project:null
    };
  }
}

// 達成フォルダに移動
function archiveMove(rootId){
  const tm=tmap();const t=tm[rootId];if(!t)return;
  const l=L();
  if(!confirm(`「${t.title}」を達成フォルダに移動しますか？`))return;
  // タスクデータをスナップショット保存
  const collect=id=>{const t=tm[id];return t?[{...t},...(t.children||[]).flatMap(collect)]:[];};
  const snap=collect(rootId);
  D.archived.push({id:rootId,title:t.title,archivedAt:new Date().toISOString(),tasks:snap});
  // アクティブから除去（タスクデータは保持）
  D.mapOrder=D.mapOrder.filter(id=>id!==rootId);
  save();
  sessionStorage.setItem('mm-archive-open','1');
  renderMindmap();
}

// 達成フォルダから戻す
function archiveRestore(rootId){
  const a=D.archived.find(x=>x.id===rootId);if(!a)return;
  D.archived=D.archived.filter(x=>x.id!==rootId);
  // タスクが削除されていなければそのまま

// ── ノード描画（長押しチェック対応） ───────────────────────
function calcNodeH(t,w,h){
  const maxW=w-28;const fontSize=10;
  const charsPerLine=Math.max(3,Math.floor(maxW/(fontSize*1.1)));
  const words=t.title.split('');
  let lines=[],cur='';
  for(const c of words){if((cur+c).length>charsPerLine){lines.push(cur);cur=c;}else cur+=c;}
  if(cur)lines.push(cur);
  const lineH=fontSize+4;
  return Math.max(h,lines.length*lineH+12);
}
function calcNodeH(t,w,h){
  const maxW=w-28;const fontSize=10;
  const charsPerLine=Math.max(3,Math.floor(maxW/(fontSize*1.1)));
  const words=t.title.split('');
  let lines=[],cur='';
  for(const c of words){if((cur+c).length>charsPerLine){lines.push(cur);cur=c;}else cur+=c;}
  if(cur)lines.push(cur);
  const lineH=fontSize+4;
  return Math.max(h,lines.length*lineH+12);
}
function drawNode(s,t,x,y,w,h,cat,isSel,isRoot=false){
  const done=t.done,sk=cat.isSketch;
  const fill=done?'#d1fae5':isSel?'#e0f7fa':sk?'#f5f0ff':'white';
  const stroke=isSel?'#06B6D4':cat.color;
  // テキストを折り返してノード高さを動的に計算
  const maxW=w-28;const fontSize=10;
  // 日本語全角文字は半角の約2倍幅
  const charsPerLine=Math.max(3,Math.floor(maxW/(fontSize*1.1)));
  const words=t.title.split('');
  let lines=[],cur='';
  for(const c of words){if((cur+c).length>charsPerLine){lines.push(cur);cur=c;}else cur+=c;}
  if(cur)lines.push(cur);
  const lineH=fontSize+4;const nodeH=Math.max(h,lines.length*lineH+12);
  const nodeEvents=`onmousedown="mmNodeDown(event,${t.id})" onmouseup="mmNodeUp(event,${t.id})" ontouchstart="mmNodeTouchStart(event,${t.id})" ontouchend="mmNodeTouchEnd(event,${t.id})" onclick="mmNodeClick(event,${t.id})" style="cursor:pointer"`;
  s+=`<g ${nodeEvents}>`;
  s+=`<rect x="${x}" y="${y}" width="${w}" height="${nodeH}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="${isSel?2.5:1.5}" filter="url(#ms)"/>`;
  if(isRoot)s+=`<rect x="${x-3}" y="${y-3}" width="${w+6}" height="${nodeH+6}" rx="10" fill="none" stroke="${stroke}" stroke-width="2" opacity="0.6"/>`;
  if(done)s+=`<line x1="${x+4}" y1="${y+nodeH/2}" x2="${x+w-4}" y2="${y+nodeH/2}" stroke="#9ca3af" stroke-width="1.5"/>`;
  s+=`<text x="${x+8}" y="${y+nodeH/2+4}" font-size="10" fill="${done?'#9ca3af':cat.color}">${esc(cat.icon)}</text>`;
  lines.forEach((ln,i)=>{
    const ty=y+(nodeH/2)-(lines.length-1)*lineH/2+i*lineH;
    s+=`<text x="${x+22}" y="${ty+4}" font-size="${fontSize}" fill="${done?'#9ca3af':sk?'#4c1d95':'#1a1a2e'}" font-family="sans-serif">${esc(ln)}</text>`;
  });
  s+=`</g>`;
  return s;
}

// 長押し検知（ノード）
let _nodeTimer=null,_nodeLongPressed=false;
function mmNodeDown(e,id){_nodeLongPressed=false;_nodeTimer=setTimeout(()=>{_nodeLongPressed=true;toggleDoneRepeat(id);if(mmRootId!==null)renderMmCanvas();},500);}
function mmNodeUp(e,id){if(_nodeTimer){clearTimeout(_nodeTimer);_nodeTimer=null;}}
function mmNodeTouchStart(e,id){_nodeLongPressed=false;if(e.touches&&e.touches.length>1){return;}// ピンチ操作中は長押し無効
_nodeTimer=setTimeout(()=>{if(e.touches&&e.touches.length>1)return;_nodeLongPressed=true;e.preventDefault();toggleDoneRepeat(id);if(mmRootId!==null)renderMmCanvas();},500);}
function mmNodeTouchEnd(e,id){if(_nodeTimer){clearTimeout(_nodeTimer);_nodeTimer=null;}}
function mmNodeClick(e,id){if(_nodeLongPressed){_nodeLongPressed=false;return;}selId=id;closeMmFloat();switchSec('home');}

function edge(x1,y1,x2,y2,color='#bae6fd',dir='h'){
  const cx=(x1+x2)/2,cy=(y1+y2)/2;
  return dir==='h'?`<path d="M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="1.5" stroke-dasharray="4 3"/>`:
    `<path d="M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="1.5" stroke-dasharray="4 3"/>`;
}
function initSvg(svg,W,H){
  svg.setAttribute('width','100%');svg.setAttribute('height','100%');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.style.width='100%';
  svg.style.height='100%';
  svg.style.maxWidth='100%';
  svg.style.maxHeight='100%';
  return `<defs><filter id="ms"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#06B6D4" flood-opacity="0.12"/></filter></defs>`;
}

// ── ツリー型 ─────────────────────────────────────────────────
function drawTree(svg,root,tm,cm,NW,NH,PAD,portrait,cw,ch){
  const cat=cm[root.category]||{icon:'🎯',color:'#06B6D4'};
  const GAP=portrait?NH+PAD*2:NW+PAD*2,SPC=portrait?PAD:PAD;
  let nodes=[],edges_arr=[];
  const measure=id=>{
    const t=tm[id];if(!t)return{span:portrait?NW:NH,nh:NH,subs:[]};
    const subs=(t.children||[]).map(c=>({id:c,...measure(c)}));
    const nh=calcNodeH(t,NW,NH);
    if(!subs.length)return{span:portrait?NW:nh,nh,subs:[]};
    const total=subs.reduce((a,c)=>a+c.span,0)+Math.max(0,subs.length-1)*SPC;
    return{span:Math.max(portrait?NW:nh,total),nh,subs};
  };
  const layout=(id,x,y,m,depth)=>{
    const t=tm[id];if(!t)return;
    const nh=m.nh||NH;
    const nx=portrait?x+m.span/2-NW/2:x,ny=portrait?y:y+m.span/2-nh/2;
    nodes.push({t,x:nx,y:ny,nh});
    let off=portrait?x:y;
    for(const s of m.subs){
      const cx=portrait?off:nx+NW+GAP,cy=portrait?ny+nh+GAP:off;
      if(portrait)edges_arr.push({x1:nx+NW/2,y1:ny+nh,x2:cx+s.span/2,y2:cy,dir:'v'});
      else edges_arr.push({x1:nx+NW,y1:ny+nh/2,x2:cx,y2:cy+s.span/2,dir:'h'});
      layout(s.id,cx,cy,s,depth+1);
      off+=s.span+SPC;
    }
  };
  const m=measure(root.id);layout(root.id,PAD,PAD,m,0);
  const W=portrait?Math.max(cw,nodes.reduce((a,n)=>Math.max(a,n.x+NW+PAD),0)):Math.max(cw,nodes.reduce((a,n)=>Math.max(a,n.x+NW+GAP+PAD),0));
  const H=portrait?Math.max(ch,nodes.reduce((a,n)=>Math.max(a,n.y+NH+GAP+PAD),0)):Math.max(ch,nodes.reduce((a,n)=>Math.max(a,n.y+NH+PAD),0));
  let s=initSvg(svg,W,H);
  edges_arr.forEach(e=>s+=edge(e.x1,e.y1,e.x2,e.y2,cat.color,e.dir));
  nodes.forEach(n=>{s=drawNode(s,n.t,n.x,n.y,NW,n.nh,cm[n.t.category]||cat,n.t.id===selId,!n.t.parentId);});
  svg.innerHTML=s;
}

// ── 組織図型 ─────────────────────────────────────────────────
function drawOrg(svg,root,tm,cm,NW,NH,PAD,portrait,cw,ch){
  const cat=cm[root.category]||{icon:'🎯',color:'#06B6D4'};
  let nodes=[],edges_arr=[];
  const GAP=portrait?NH+PAD*2:NW+PAD*2;
  const measure=id=>{
    const t=tm[id];if(!t)return{cols:1};
    const subs=(t.children||[]).map(c=>({id:c,...measure(c)}));
    return{cols:subs.length?subs.reduce((s,c)=>s+c.cols,0):1,subs};
  };
  const layout=(id,lv,col)=>{
    const t=tm[id];if(!t)return;
    const x=portrait?col*(NW+PAD)+PAD:lv*(NW+GAP)+PAD,y=portrait?lv*(NH+GAP)+PAD:col*(NH+PAD)+PAD;
    nodes.push({t,x,y,nh:NH});
    const m=measure(id);let c=col;
    (t.children||[]).forEach(cid=>{
      const mc=measure(cid);
      const nx=portrait?c*(NW+PAD)+PAD:x+NW+GAP,ny=portrait?y+NH+GAP:c*(NH+PAD)+PAD;
      if(portrait)edges_arr.push({x1:x+NW/2,y1:y+NH,x2:nx+NW/2,y2:ny,dir:'v'});
      else edges_arr.push({x1:x+NW,y1:y+NH/2,x2:nx,y2:ny+NH/2,dir:'h'});
      layout(cid,lv+1,c);c+=mc.cols;
    });
  };
  layout(root.id,0,0);
  const W=Math.max(cw,nodes.reduce((a,n)=>Math.max(a,n.x+NW+PAD),0));
  const H=Math.max(ch,nodes.reduce((a,n)=>Math.max(a,n.y+NH+PAD),0));
  let s=initSvg(svg,W,H);
  edges_arr.forEach(e=>s+=edge(e.x1,e.y1,e.x2,e.y2,'#94a3b8',e.dir));
  nodes.forEach(n=>{s=drawNode(s,n.t,n.x,n.y,NW,n.nh,cm[n.t.category]||cat,n.t.id===selId,!n.t.parentId);});
  svg.innerHTML=s;
}

// ── ロジックツリー ───────────────────────────────────────────
function drawLogic(svg,root,tm,cm,NW,NH,PAD,cw,ch){
  const cat=cm[root.category]||{icon:'🎯',color:'#06B6D4'};
  let nodes=[],edges_arr=[],sy=PAD;
  const INDENT=NW*0.5,VG=PAD/2+6;// +6 for isRoot double border
  const layout=(id,depth)=>{
    const t=tm[id];if(!t)return;
    const x=depth*INDENT+PAD,y=sy;
    nodes.push({t,x,y,nh:NH});
    if(depth>0)edges_arr.push({x1:x,y1:y+NH/2,x2:x-INDENT+NW,y2:y+NH/2,dir:'h'});
    sy+=NH+VG;
    (t.children||[]).forEach(cid=>layout(cid,depth+1));
  };
  layout(root.id,0);
  const W=Math.max(cw,nodes.reduce((a,n)=>Math.max(a,n.x+NW+PAD),0));
  const H=Math.max(ch,sy+PAD);
  let s=initSvg(svg,W,H);
  edges_arr.forEach(e=>s+=`<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}" stroke="#bae6fd" stroke-width="1.5"/>`);
  nodes.forEach(n=>{s=drawNode(s,n.t,n.x,n.y,NW,n.nh,cm[n.t.category]||cat,n.t.id===selId,!n.t.parentId);});
  svg.innerHTML=s;
}

// ── 放射状マップ ──────────────────────────────────────────────
function drawRadial(svg,root,tm,cm,NW,NH,PAD,cw,ch){
  const cat=cm[root.category]||{icon:'🎯',color:'#06B6D4'};
  const cx=cw/2,cy=ch/2;
  const children=(root.children||[]).map(id=>tm[id]).filter(Boolean);
  const N=children.length||1;
  // ノード高さを考慮して半径を動的計算
  const maxChildH=children.length?Math.max(...children.map(t=>calcNodeH(t,NW,NH))):NH;
  const nodeSize=Math.sqrt(NW*NW+maxChildH*maxChildH);
  const baseR=Math.min(cx,cy);
  const R1=baseR*0.55*1.5;
  const R2=R1+baseR*0.4*1.5;
  // 放射状：全ノードが収まるSVGサイズを計算（中心を真ん中に）
  const svgR=R2+NW+PAD*2;
  const svgW=svgR*2;
  const svgH=svgR*2;
  const newCx=svgW/2,newCy=svgH/2;
  let s=initSvg(svg,svgW,svgH);
  const nodeList=[];
  const rootH=calcNodeH(root,NW,NH);
  nodeList.push({t:root,x:newCx-NW/2,y:newCy-rootH/2,w:NW,h:rootH,cat,isRoot:true});
  children.forEach((t,i)=>{
    const a=(i/N)*Math.PI*2-Math.PI/2;
    const nh=calcNodeH(t,NW,NH);
    const nx=newCx+R1*Math.cos(a)-NW/2,ny=newCy+R1*Math.sin(a)-nh/2;
    const c2=cm[t.category]||{icon:'🎯',color:'#06B6D4'};
    s+=edge(newCx,newCy,nx+NW/2,ny+nh/2,c2.color,'h');
    nodeList.push({t,x:nx,y:ny,w:NW,h:nh,cat:c2,isRoot:false});
    const gcs=(t.children||[]).map(id=>tm[id]).filter(Boolean);
    const M=gcs.length;
    gcs.forEach((gc,j)=>{
      const spread=Math.PI/3,ba=a-spread/2+(j/Math.max(M-1,1))*spread;
      const gcH=calcNodeH(gc,NW,NH);
      const gx=nx+NW/2+(R2-R1)*Math.cos(ba)-NW/2,gy=ny+nh/2+(R2-R1)*Math.sin(ba)-gcH/2;
      const c3=cm[gc.category]||{icon:'🎯',color:'#06B6D4'};
      s+=edge(nx+NW/2,ny+nh/2,gx+NW/2,gy+gcH/2,c3.color,'h');
      nodeList.push({t:gc,x:gx,y:gy,w:NW,h:gcH,cat:c3,isRoot:false});
    });
  });
  nodeList.forEach(n=>{s=drawNode(s,n.t,n.x,n.y,n.w,n.h,n.cat,n.t.id===selId,n.isRoot);});
  svg.innerHTML=s;
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px">
      <div><div class="lbl">📅 ${l.dueDate}</div><input class="inp" type="date" id="child-due" style="font-size:11px;padding:7px 8px"/></div>
      <div><div class="lbl">🔁 ${l.repeat}</div><select class="inp" id="child-repeat" style="font-size:11px;padding:7px 8px">${repOpts.map(([v,t])=>`<option value="${v}">${t}</option>`).join('')}</select></div>
    </div>
    <div class="row" style="gap:6px"><button class="btn bp" style="flex:1" id="child-add-btn">${l.addtask}</button><button class="btn bg" onclick="hideModal()">${l.catCancel}</button></div>`,
  ()=>{
    const cinp=document.getElementById('child-inp'),addBtn=document.getElementById('child-add-btn');
    setTimeout(()=>cinp?.focus(),80);
    const doAdd=()=>{
      const title=cinp?.value?.trim();if(!title)return;
      addTask(title,parentId,parent?.category||'dream',{dueDate:document.getElementById('child-due')?.value||null,repeat:document.getElementById('child-repeat')?.value||'none'});
      hideModal();if(selId===parentId)render();
    };
    addBtn?.addEventListener('click',doAdd);
    cinp?.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
  });
}

// ============================================================
// カテゴリ管理
// ============================================================
function openCatManager(){
  const l=L();let cats=[...D.categories];
  let editIdx=null,newLbl='',newIco='🎯',newClr='#8b5cf6';
  const render_cm=()=>{
    showModal(`<div class="mot">⚙️ ${l.catmgr}</div>
      <div id="cm-list">${cats.map((cat,i)=>`<div class="cmi"><div style="width:14px;height:14px;border-radius:50%;background:${cat.color}"></div><span style="font-size:16px">${cat.icon}</span><span style="flex:1;font-weight:700;font-size:12px">${esc(cat.label)}</span>${FIXED.includes(cat.id)?`<span class="fb">${l.catFixed}</span>`:`<button class="bic" onclick="window._cmEdit(${i})">${editIdx===i?'✕':'✏️'}</button><button class="bic" style="color:#ef4444" onclick="window._cmDel(${i})">🗑</button>`}</div>${editIdx===i&&!FIXED.includes(cat.id)?`<div class="eb"><input class="inp" id="cm-lbl-${i}" value="${esc(cat.label)}" placeholder="${l.catNewPh}" style="margin-bottom:6px"/><div class="lbs">${l.catEmojiL}</div><div class="eg">${EMOJIS.map(e=>`<span class="eo${cat.icon===e?' s':''}" onclick="window._cmEmo(${i},'${e}')">${e}</span>`).join('')}</div><div class="lbs">${l.catColorL}</div><div class="cg">${COLORS.map(c=>`<div class="co${cat.color===c?' s':''}" style="background:${c}" onclick="window._cmClr(${i},'${c}')"></div>`).join('')}</div><button class="btn bp bs" style="margin-top:8px" onclick="window._cmSave(${i})">✓</button></div>`:''}`).join('')}</div>
      <div class="ab"><div style="font-size:12px;font-weight:700;color:#0e7490;margin-bottom:8px">＋ ${l.catAdd}</div>
        <input class="inp" id="cm-new-lbl" value="${esc(newLbl)}" placeholder="${l.catNewPh}" style="margin-bottom:6px"/>
        <div class="lbs">${l.catEmojiL}</div><div class="eg">${EMOJIS.map(e=>`<span class="eo${newIco===e?' s':''}" onclick="window._cmNewEmo('${e}')">${e}</span>`).join('')}</div>
        <div class="lbs">${l.catColorL}</div><div class="cg">${COLORS.map(c=>`<div class="co${newClr===c?' s':''}" style="background:${c}" onclick="window._cmNewClr('${c}')"></div>`).join('')}</div>
        ${newLbl?`<div class="pvr"><span style="font-size:11px;color:#64748b">${l.catPreview}</span><span class="pill" style="background:${catBg(newClr)};color:${newClr};border-color:${newClr}">${newIco} ${esc(newLbl)}</span></div>`:''}
        <button class="btn bp bw" style="margin-top:8px" onclick="window._cmAdd()">＋ ${l.catAdd}</button>
      </div>
      <div class="row" style="gap:6px"><button class="btn bp" style="flex:1" onclick="window._cmFinal()">${l.catSave}</button><button class="btn bg" onclick="hideModal()">${l.catCancel}</button></div>`,
    ()=>{document.getElementById('cm-new-lbl')?.addEventListener('input',e=>{newLbl=e.target.value;render_cm();});});
  };
  Object.assign(window,{
    _cmEdit:i=>{editIdx=editIdx===i?null:i;render_cm();},
    _cmDel:i=>{cats.splice(i,1);if(editIdx===i)editIdx=null;render_cm();},
    _cmEmo:(i,e)=>{cats[i]={...cats[i],icon:e};render_cm();},
    _cmClr:(i,c)=>{cats[i]={...cats[i],color:c};render_cm();},
    _cmSave:i=>{const inp=document.getElementById(`cm-lbl-${i}`);if(inp)cats[i]={...cats[i],label:inp.value.trim()||cats[i].label};editIdx=null;render_cm();},
    _cmNewEmo:e=>{newIco=e;render_cm();},
    _cmNewClr:c=>{newClr=c;render_cm();},
    _cmAdd:()=>{const inp=document.getElementById('cm-new-lbl');newLbl=inp?.value?.trim()||'';if(!newLbl)return;cats.push({id:'cat_'+uid(),label:newLbl,icon:newIco,color:newClr});newLbl='';render_cm();},
    _cmFinal:()=>{D.categories=cats;save();hideModal();render();},
  });
  render_cm();
}

// ============================================================
// メインrender
// ============================================================
function render(){
  if(curSec==='home'){selId?renderHomeDetail():renderHome();}
  else if(curSec==='tasks')renderTasks();
  else if(curSec==='map')renderMindmap();
  else if(curSec==='shop')renderShopping();
  else if(curSec==='cal')renderCalendar();
  else if(curSec==='help')renderHelp();
  else if(curSec==='lang')renderLangGrid();
}

// ============================================================
// イベント / 起動
// ============================================================
document.getElementById('add-task-btn').addEventListener('click',()=>{
  const inp=document.getElementById('new-task-inp'),title=inp.value.trim();if(!title)return;
  addTask(title,null,newCat);inp.value='';document.getElementById('vh-task').textContent='';
  selId=null;switchSec('home');
});
document.getElementById('new-task-inp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-task-btn').click();});
document.getElementById('mic-task').addEventListener('click',()=>startVoice('task'));
document.getElementById('cal-prev').addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1);renderCalendar();});
document.getElementById('cal-next').addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1);renderCalendar();});

// ボトムナビのタップ処理（touchendで確実に反応させる）
document.querySelectorAll('.nb').forEach(btn=>{
  btn.addEventListener('click',()=>switchSec(btn.dataset.s));
  btn.addEventListener('touchend',e=>{e.preventDefault();switchSec(btn.dataset.s);});
});

// Service Worker disabled
if('serviceWorker' in navigator)navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));

syncCatLabels();
applyLang(curLang);
render();
</script>
